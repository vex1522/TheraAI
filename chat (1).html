<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI therapist</title>

<style>
html,body{
    margin:0;padding:0;height:100%;width:100%;
    font-family: 'Segoe UI', sans-serif;
    background:#E5F5EA;
}
#app{height:100%;width:100%;overflow:hidden;}

#welcome{
    height:100%;width:100%;
    display:flex;justify-content:center;align-items:center;
    flex-direction:column;gap:20px;
    background:#A6D9C4;
    transition: transform .7s cubic-bezier(.21,.84,.44,1);
}
#welcome.hide{transform:translateY(-100%);}

.chat-box{
    height:100%;width:100%;
    display:flex;flex-direction:column;
}

.header{
    padding:18px;
    background:#8BC7A6;
    color:white;
    font-size:20px;
}

#messages{
    flex:1;padding:20px;overflow-y:auto;
    display:flex;flex-direction:column;gap:16px;
}
.bubble{
    max-width:65%;padding:14px 18px;border-radius:18px;
    position:relative;line-height:1.38;font-size:15px;
}
.bubble.user{
    background:white;align-self:flex-end;
    border-bottom-right-radius:4px;
}
.bubble.bot{
    background:#C7E8D7;align-self:flex-start;
    border-bottom-left-radius:4px;
}
.sender{font-size:11px;font-weight:600;margin-bottom:5px;opacity:.5;}

.emochip{font-size:11px;opacity:.55;margin-top:4px;}

.typing{
    width: 26px;height:10px;display:flex;gap:4px;align-self:flex-start;
}
.dot{
    width:6px;height:6px;border-radius:50%;
    background:#6f9f89;animation: blink 1.2s infinite alternate;
}
.dot:nth-child(2){animation-delay: .2s;}
.dot:nth-child(3){animation-delay: .4s;}
@keyframes blink{ from{opacity:.3;} to{opacity:1;} }

#input-area{
    display:flex;padding:16px;border-top:1px solid #ddd;gap:10px;background:#FAFAFA;
}
#msg{flex:1;padding:12px;font-size:15px;border-radius:10px;border:1px solid #ccc;}
#send{
    background:#81BFA0;color:white;border:0;padding:0 20px;border-radius:10px;
}
</style>
</head>
<body>

<div id="app">

    <!-- welcome screen -->
    <div id="welcome">
        <h1 style="color:white;font-size:34px;">AI therapist</h1>
        <button id="start" style="padding:16px 32px;border-radius:14px;border:0;font-size:18px;">
            Begin Session
        </button>
    </div>

    <!-- chat -->
    <div class="chat-box" id="chat" style="display:none;">
        <div class="header">AI therapist</div>
        <div id="messages"></div>

        <div id="input-area">
            <input id="msg" type="text" placeholder="type your feelings…"/>
            <button id="send">➤</button>
        </div>
    </div>
</div>

<script>
let welcome = document.getElementById("welcome");
let chat = document.getElementById("chat");
document.getElementById("start").onclick = ()=>{
    welcome.classList.add("hide");
    setTimeout(()=>{ welcome.style.display="none"; chat.style.display="flex"; },700);
};

let msgs=document.getElementById("messages");
let input=document.getElementById("msg");

function scrollDown(){msgs.scrollTop=msgs.scrollHeight;}

function addUser(msg){
    let d=document.createElement("div");
    d.className="bubble user";
    d.innerHTML="<div class='sender'>You</div>"+msg;
    msgs.appendChild(d); scrollDown();
}

function addTyping(){
    let t=document.createElement("div");
    t.id="typing";
    t.className="bubble bot";
    t.innerHTML='<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    msgs.appendChild(t); scrollDown();
}

function removeTyping(){
    let t=document.getElementById("typing");
    if(t) t.remove();
}

function addBot(msg,emo){
    let d=document.createElement("div");
    d.className="bubble bot";
    d.innerHTML="<div class='sender'>Therapist</div>"+msg+`<div class='emochip'>emotion: ${emo}</div>`;
    msgs.appendChild(d); scrollDown();
}

async function send(){
    let text=input.value.trim(); if(!text)return;
    addUser(text);
    input.value="";

    addTyping();

    let r=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text})});
    let data=await r.json();

    removeTyping();
    addBot(data.reply,data.emotion);
}

document.getElementById("send").onclick=send;
input.addEventListener("keydown",(e)=>{if(e.key==="Enter")send();});
</script>

</body>
</html>
